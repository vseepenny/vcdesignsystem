<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSee Design System — Framework Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
    }

    /* ---- Top Bar ---- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 9999;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbar-logo {
      width: 32px;
      height: 32px;
      background: #0D875C;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
    }

    .topbar-subtitle {
      font-size: 13px;
      color: #6B7280;
      margin-left: 4px;
      white-space: nowrap;
    }

    /* ---- Segmented Toggle ---- */
    .toggle-group {
      display: flex;
      background: #F3F4F6;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #6B7280;
      background: transparent;
      cursor: pointer;
      transition: all 150ms ease;
      white-space: nowrap;
    }

    .toggle-btn:hover {
      color: #374151;
    }

    .toggle-btn.active {
      background: #0D875C;
      color: #FFFFFF;
      box-shadow: 0 1px 3px rgba(13, 135, 92, 0.3);
    }

    /* ---- Status Label ---- */
    .topbar-right {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .status-label {
      font-size: 12px;
      color: #9CA3AF;
      white-space: nowrap;
    }

    .status-label strong {
      color: #374151;
      font-weight: 600;
    }

    /* ---- Iframes ---- */
    .frame-container {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .frame-container iframe.visible {
      display: block;
    }

    /* ---- Responsive ---- */
    @media (max-width: 720px) {
      .topbar-subtitle,
      .status-label {
        display: none;
      }

      .topbar {
        padding: 0 12px;
      }

      .toggle-btn {
        padding: 6px 14px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">V</div>
      <span class="topbar-title">VSee Design System</span>
      <span class="topbar-subtitle">— Framework Comparison</span>
    </div>

    <div class="toggle-group">
      <button class="toggle-btn active" data-view="antd" onclick="switchView('antd')">Ant Design v5</button>
      <button class="toggle-btn" data-view="tailwind" onclick="switchView('tailwind')">Tailwind CSS</button>
    </div>

    <div class="topbar-right">
      <span class="status-label">Currently viewing: <strong id="current-label">Ant Design v5</strong></span>
    </div>
  </header>

  <div class="frame-container">
    <iframe id="antd-frame" class="visible" src="vsee-design-system-antd.html" title="Ant Design v5 Edition"></iframe>
    <iframe id="tailwind-frame" src="vsee-design-system-tailwind.html" title="Tailwind CSS Edition"></iframe>
  </div>

  <script>
    let currentView = 'antd';

    function switchView(view) {
      if (view === currentView) return;
      currentView = view;

      // Toggle iframe visibility
      document.getElementById('antd-frame').classList.toggle('visible', view === 'antd');
      document.getElementById('tailwind-frame').classList.toggle('visible', view === 'tailwind');

      // Toggle button active state
      document.querySelectorAll('.toggle-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-view') === view);
      });

      // Update status label
      var label = view === 'antd' ? 'Ant Design v5' : 'Tailwind CSS';
      document.getElementById('current-label').textContent = label;
    }
  </script>

</body>
</html>
